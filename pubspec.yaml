name: smartchat
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # 🔐 Secure storage (login token, userId vs.)
  flutter_secure_storage: ^9.2.2

  # 🔄 State management
  provider: ^6.1.2

  # ✍🏻 Fonts
  google_fonts: ^6.2.1

  # 🖼 Kamera / Galeri
  image_picker: ^1.0.7

  # 🌐 HTTP istekleri
  dio: ^5.4.0

  # 🎤 Ses kaydı (şimdilik kullanmıyoruz ama dursun istersen)
  record: ^6.1.2

  # iOS tarzı ikonlar
  cupertino_icons: ^1.0.8

  socket_io_client: ^2.0.3+1
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true


